<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test Profesional Completo</title>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body, html {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f8f9fa;
}

/* LOGIN */
#loginScreen {
  position: fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:#0a2342;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

#loginScreen input {
  width:280px;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

#loginBtn {
  margin-top:12px;
  background:#1e40af;
  border:none;
  padding:12px 30px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

#loginError {
  color:#f87171;
  margin-top:8px;
}

/* PANEL */
#mainPanel {
  display:none;
  padding:24px 40px;
}

header {
  text-align:center;
  margin-bottom:20px;
  position: relative;
}

#logoutBtn {
  position:absolute;
  top:0;
  right:0;
  padding:8px 16px;
  background:red;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.card {
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h1>Iniciar Sesión</h1>
  <input type="text" id="username" placeholder="Usuario">
  <input type="password" id="password" placeholder="Contraseña">
  <button id="loginBtn">Entrar</button>
  <div id="loginError"></div>
</div>

<!-- PANEL -->
<div id="mainPanel">
  <header>
    <h2>Competencias Técnicas</h2>
    <div id="userDisplay"></div>
    <button id="logoutBtn">Cerrar Sesión</button>
  </header>

  <h3>Componentes Certificados</h3>
  <div id="componentesUsuario"></div>
</div>

<script>
// ================= SUPABASE =================
const supabaseUrl = "https://gogalvnmpntvjtiunowz.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvZ2Fsdm5tcG50dmp0aXVub3d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNzM5MzcsImV4cCI6MjA4Nzg0OTkzN30.wOZbM_s2F-FjdrXqUz6lvRnOYAPuTYlGhwcP3hzbYTw";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

// ================= USUARIOS =================
const usuarios = {
  "Alvarez Padilla Cristian Alexis": { password: "1234" },
  "Larios Diaz Oscar Daniel": { password: "1234" }
};

let currentUser = "";

// ================= LOGIN =================
document.getElementById("loginBtn").addEventListener("click", async ()=>{

  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();
  const errorDiv = document.getElementById("loginError");

  if(usuarios[u] && usuarios[u].password === p){

    currentUser = u;

    document.getElementById("loginScreen").style.display="none";
    document.getElementById("mainPanel").style.display="block";
    document.getElementById("userDisplay").textContent = "Usuario: " + currentUser;

    await cargarCompetenciasUsuario(currentUser);

  } else {
    errorDiv.textContent = "Usuario o contraseña incorrectos";
  }
});

// ================= LOGOUT =================
document.getElementById("logoutBtn").addEventListener("click", ()=>{
  document.getElementById("mainPanel").style.display="none";
  document.getElementById("loginScreen").style.display="flex";
  document.getElementById("username").value="";
  document.getElementById("password").value="";
  document.getElementById("loginError").textContent="";
});

// ================= CONSULTAR SUPABASE =================
async function cargarCompetenciasUsuario(usuario){
  try {
    const { data, error } = await supabaseClient
      .from("puntaje_tecnico")
      .select(`"Descripcion de Tarea","Componente","Codigo RH","${usuario}"`)
      .eq(usuario, 1);

    if(error){
      console.error(error);
      alert("Error leyendo datos desde Supabase");
      return;
    }

    console.log("Datos recibidos:", data); // <-- Revisar en consola si se conecta
    mostrarComponentes(data);

  } catch(e) {
    console.error(e);
    alert("Error inesperado al consultar Supabase");
  }
}

// ================= MOSTRAR RESULTADOS =================
function mostrarComponentes(data){

  const contenedor = document.getElementById("componentesUsuario");
  contenedor.innerHTML = "";

  if(!data || data.length === 0){
    contenedor.innerHTML = "<p>No tiene competencias registradas.</p>";
    return;
  }

  data.forEach(item=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <strong>RH:</strong> ${item["Codigo RH"]}<br>
      <strong>Componente:</strong> ${item["Componente"]}<br>
      <strong>Tarea:</strong> ${item["Descripcion de Tarea"]}
    `;
    contenedor.appendChild(div);
  });
}
</script>

</body>

</html>
